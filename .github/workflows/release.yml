name: Release

# Publishes to PyPI when a version tag is pushed. Uses PyPI trusted publishing
# (OIDC), so no API token is stored in the repository. This requires a one-time
# setup on PyPI: register the "cogwright-rag" project with this repository, the
# "release.yml" workflow, and the "pypi" environment as a trusted publisher. See
# RELEASING.md.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
